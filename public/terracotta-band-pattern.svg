  <g
    fill="none"
    stroke="#e8e4da"
    stroke-width="2.1"
    stroke-linecap="round"
    stroke-opacity="0.35"
  >
    <line x1="90" y1="90" x2="124" y2="90" />
    <line x1="90" y1="90" x2="114.04" y2="114.04" />
    <line x1="90" y1="90" x2="90" y2="124" />
    <line x1="90" y1="90" x2="65.96" y2="114.04" />
    <line x1="90" y1="90" x2="56" y2="90" />
    <line x1="90" y1="90" x2="65.96" y2="65.96" />
    <line x1="90" y1="90" x2="90" y2="56" />
    <line x1="90" y1="90" x2="114.04" y2="65.96" />
  </g>
  <circle cx="90" cy="90" r="3.5" fill="#e8e4da" fill-opacity="0.4" />
